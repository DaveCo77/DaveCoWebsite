<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixel Array | Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen flex flex-col items-center justify-center p-6">

    <div id="loading" class="text-slate-500 animate-pulse">Authenticating...</div>

    <!-- MAIN HUB CONTAINER -->
    <div id="hub-container" class="hidden w-full max-w-4xl">
        <div class="flex justify-between items-end mb-8 border-b border-white/10 pb-4">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Software <span class="text-blue-500">Hub</span></h1>
            <button id="btn-logout" class="text-sm text-slate-500 hover:text-red-400">Sign Out</button>
        </div>

        <!-- STATE 1: LITE USER (Needs to Upgrade) -->
        <div id="lite-ui" class="hidden bg-[#111] border border-white/10 rounded-lg p-8 text-center mb-8">
            <h2 class="text-xl font-bold mb-2">Upgrade to Pixel Array Premium</h2>
            <p class="text-slate-400 mb-6 text-sm">Unlock unrestricted access to the full Pixel Array Software Suite.</p>
            
            <!-- THE CRITICAL STRIPE LINK -->
            <a id="stripe-checkout-btn" href="#" class="inline-block bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded transition-all">
                Subscribe for $49.99/mo
            </a>
        </div>

        <!-- STATE 2: PREMIUM USER (Tools Unlocked) -->
        <div id="premium-ui" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
            <a href="https://signalco.pixelarray.com.au/master.html" class="block bg-[#111] border border-white/10 hover:border-blue-500 p-6 rounded-lg transition-all group">
                <h3 class="text-lg font-bold text-white group-hover:text-blue-400">SignalCo Pro</h3>
                <p class="text-sm text-slate-500 mt-1">Launch Master Control</p>
            </a>
            <!-- Add other tools here -->
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="./js/dashboard.js"></script>
</body>
</html>
