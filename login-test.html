<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Array | Secure Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FIREBASE CDNs (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { background-color: #050505; }
        .glass-panel {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-[#050505] min-h-screen flex items-center justify-center text-slate-300 font-sans p-4">
    <div class="w-full max-w-sm bg-black border border-white/10 p-8 rounded-lg shadow-2xl">
        
        <div class="mb-8">
            <h1 class="text-2xl font-black tracking-tighter uppercase text-white mb-1">PIXEL <span class="text-blue-500">ARRAY</span></h1>
            <p class="text-sm text-slate-500">Sign in to your account.</p>
        </div>

        <div class="flex bg-[#111] rounded p-1 mb-6 border border-white/5">
            <button id="tab-login" class="flex-1 py-1.5 text-sm font-bold rounded bg-slate-800 text-white transition-all">Sign In</button>
            <button id="tab-signup" class="flex-1 py-1.5 text-sm font-bold rounded text-slate-500 hover:text-slate-300 transition-all">Sign Up</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Email</label>
                <input type="email" id="email" placeholder="name@company.com" required class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Password</label>
                <input type="password" id="password" placeholder="••••••••" required class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <button id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded transition-all mt-2 text-sm">
                Sign In
            </button>
        </div>

        <div id="status-container" class="mt-4 hidden p-3 rounded border text-sm text-center">
            <span id="status-msg"></span>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDKaT-5zrry7pNHkqSFdx-OhhtuAPe97y8",
            authDomain: "pixel-array-net.firebaseapp.com",
            projectId: "pixel-array-net",
            storageBucket: "pixel-array-net.firebasestorage.app",
            messagingSenderId: "63643759347",
            appId: "1:63643759347:web:79078b6c106b29c238bd86",
            measurementId: "G-KTNZJQ2CBG"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Elements
        let isLoginMode = true;
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const authBtn = document.getElementById('auth-btn');
        const statusContainer = document.getElementById('status-container');
        const statusMsg = document.getElementById('status-msg');

        // Toggle UI Modes
        function setMode(login) {
            isLoginMode = login;
            if (login) {
                tabLogin.className = "flex-1 py-2 text-sm font-bold rounded-md bg-slate-800 text-white transition-all shadow-sm";
                tabSignup.className = "flex-1 py-2 text-sm font-bold rounded-md text-slate-500 hover:text-slate-300 transition-all";
                authBtn.textContent = "AUTHENTICATE";
            } else {
                tabSignup.className = "flex-1 py-2 text-sm font-bold rounded-md bg-slate-800 text-white transition-all shadow-sm";
                tabLogin.className = "flex-1 py-2 text-sm font-bold rounded-md text-slate-500 hover:text-slate-300 transition-all";
                authBtn.textContent = "INITIALIZE ACCOUNT";
            }
            statusContainer.classList.add('hidden');
        }

        tabLogin.addEventListener('click', () => setMode(true));
        tabSignup.addEventListener('click', () => setMode(false));

        // Helper to show messages
        function showMessage(msg, type) {
            statusContainer.classList.remove('hidden', 'bg-red-500/10', 'border-red-500/30', 'text-red-400', 'bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400', 'bg-blue-500/10', 'border-blue-500/30', 'text-blue-400');
            
            if (type === 'error') statusContainer.classList.add('bg-red-500/10', 'border-red-500/30', 'text-red-400');
            else if (type === 'success') statusContainer.classList.add('bg-emerald-500/10', 'border-emerald-500/30', 'text-emerald-400');
            else statusContainer.classList.add('bg-blue-500/10', 'border-blue-500/30', 'text-blue-400');
            
            statusMsg.textContent = msg;
        }

        // Main Auth Logic
        authBtn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                showMessage("Invalid matrix data. Minimum 6 character passphrase required.", "error");
                return;
            }

            authBtn.disabled = true;
            authBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                if (isLoginMode) {
                    authBtn.textContent = "VERIFYING CREDENTIALS...";
                    await auth.signInWithEmailAndPassword(email, password);
                    showMessage("Access Granted. Routing to dashboard...", "success");
                    
                    // Route them to your new Premium Hub or Tool
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

                } else {
                    authBtn.textContent = "BUILDING PROFILE...";
                    
                    // 1. Create the secure login credentials
                    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                    const user = userCredential.user;

                    // 2. Build their profile in Firestore, defaulting to the free tier
                    await db.collection('users').doc(user.uid).set({
                        email: user.email,
                        status: 'lite', // This is what Stripe will change to 'premium' later!
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showMessage("Profile Initialized. Routing to dashboard...", "success");
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                }
            } catch (error) {
                console.error(error);
                showMessage(`ERR: ${error.message}`, "error");
                authBtn.disabled = false;
                authBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                authBtn.textContent = isLoginMode ? "AUTHENTICATE" : "INITIALIZE ACCOUNT";
            }
        });
    </script>
</body>
</html>
